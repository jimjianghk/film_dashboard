name: Update film data

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install xlsx

      - name: Fetch and parse spreadsheet
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: node scripts/fetch-and-parse.mjs

      - name: Commit if changed
        run: |
          git diff --quiet data.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILM_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data.json')).length)")
          git add data.json
          git commit -m "Update film data — ${FILM_COUNT} films"
          git push
